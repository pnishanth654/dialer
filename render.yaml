# Render Blueprint — free Node web service for the Dialer backend + dashboard.
# Connect this repo on render.com; it auto-detects this file.
# Secrets (sync:false) are entered in the Render dashboard, never committed.
services:
  - type: web
    name: dialer
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: REQUIRE_API_KEY
        value: "true"
      - key: DATABASE_URL        # your Neon connection string
        sync: false
      - key: ADMIN_API_KEY       # the key that unlocks the Accounts tab (your owner key)
        sync: false
